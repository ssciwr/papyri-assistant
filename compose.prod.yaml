name: papyri-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: scrapyrus
      POSTGRES_USER: scrapyrus
      POSTGRES_PASSWORD: scrapyrus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapyrus -d scrapyrus"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  scrapyrus:
    build: ./scrapyrus
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SCRAPYRUS_DATABASE_URL: postgresql://scrapyrus:scrapyrus@postgres:5432/scrapyrus
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ./scrapyrus:/workspace

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BACKEND_PORT: "3001"
      CORS_ORIGIN: "${CORS_ORIGIN:-}"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${PROD_VITE_API_URL:-/api}
        VITE_WARNING_BANNER_TEXT: ${VITE_WARNING_BANNER_TEXT:-}
    ports:
      - "${FRONTEND_HTTP_PORT:-${FRONTEND_PORT:-80}}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    environment:
      FRONTEND_HTTPS_PORT: ${FRONTEND_HTTPS_PORT:-443}
      NGINX_ENVSUBST_FILTER: "^FRONTEND_HTTPS_PORT$$"
    secrets:
      - source: tls_certificate
        target: /etc/nginx/tls/tls.pem
      - source: tls_private_key
        target: /etc/nginx/tls/tls.key
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:

secrets:
  tls_certificate:
    file: ${TLS_CERTIFICATE_PATH:-./certs/tls.pem}
  tls_private_key:
    file: ${TLS_PRIVATE_KEY_PATH:-./certs/tls.key}
