name: papyri-prod

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BACKEND_PORT: "3001"
      CORS_ORIGIN: "${CORS_ORIGIN:-}"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WARNING_BANNER_TEXT: ${VITE_WARNING_BANNER_TEXT:-}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
